<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Koki Designing Minecraft</title>

  <!-- アイコン -->
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">

  <!-- PWA（ホーム画面に追加でアプリ風起動） -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#3e6b24">

  <!-- iOS 全画面表示 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Koki Designing Minecraft">

  <!-- ブランド用の手書き練習フォント（Playwrite NZ Guides: 点線の練習補助線あり） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Guides:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css?v=20260423-ui38">
</head>
<body>
  <!-- ヘッダー -->
  <header id="header">
    <div class="brand">
      <img src="/icon.png" alt="" class="brand-icon">
      <h1 class="brand-title">
        <span class="brand-line">Koki</span>
        <span class="brand-line">Designing</span>
        <span class="brand-line brand-line--project">Minecraft</span>
      </h1>
    </div>
  </header>

  <main>
    <!-- 新しいアイデアを書く -->
    <section id="new-idea-section" class="card">
      <div class="section-head">
        <p class="section-kicker">Start here</p>
        <h2>New Idea</h2>
      </div>

      <div id="new-idea-card" class="idea-item idea-item-new open">
        <div class="idea-summary">
          <div class="idea-progress" aria-label="Phase progress">
            <span class="idea-progress-step idea-progress-step--current">
              <span class="idea-progress-icon"></span>
              <span class="idea-progress-label">Idea</span>
            </span>
            <span class="idea-progress-step idea-progress-step--pending">
              <span class="idea-progress-icon"></span>
              <span class="idea-progress-label">Discussion with Hari</span>
            </span>
            <span class="idea-progress-step idea-progress-step--pending">
              <span class="idea-progress-icon"></span>
              <span class="idea-progress-label">Build with Hari</span>
            </span>
          </div>
        </div>
        <div class="idea-details" aria-hidden="false">
          <p class="field-kicker">Title</p>
          <input type="text" id="idea-title" placeholder="タイトル（例：ドラゴンを追加したい）" maxlength="80">
          <p class="field-kicker">Description</p>
          <textarea id="idea-body" rows="6" placeholder="どんなことをしたい？&#10;&#10;だれが出てくる？&#10;なにが起きる？&#10;ゲームの中でどうなる？"></textarea>
          <button id="submit-btn" onclick="submitIdea()">Start New Idea</button>
          <p id="submit-status" class="status-msg"></p>
        </div>
      </div>
    </section>

    <!-- Koki のアイデア一覧 -->
    <section id="conversations" class="card">
      <div class="section-head">
        <p class="section-kicker">Idea Archives</p>
        <h2>Koki's Ideas</h2>
      </div>

      <div id="idea-list"></div>
    </section>
  </main>

  <script src="/app.js?v=20260423-ui38"></script>
</body>
</html>
