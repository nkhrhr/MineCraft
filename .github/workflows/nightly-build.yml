name: Build Release

# トリガー:
#  - master への push（PR マージで即発火）
#  - 手動実行（ダッシュボードから叩く用）
#  - 週1 日曜深夜の安全網（万一 push を逃しても最新ビルドが残る）
on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 0'  # 毎週日曜 00:00 JST

# 同じ master への連続 push は新しいビルドで古いビルドを打ち切る
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate JSON
        run: npm run validate

      - name: Auto-increment version
        run: |
          node scripts/bump-version.js patch
          echo "NEW_VERSION=$(node -p "require('./version.json').version")" >> $GITHUB_ENV

      - name: Build packages
        run: npm run pack

      - name: Create .mcworld
        run: node scripts/create-world.js

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.NEW_VERSION }}
          name: "v${{ env.NEW_VERSION }}"
          files: |
            dist/*.mcworld
            dist/*.mcaddon
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
